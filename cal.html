<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to do list</title>
    <link rel="stylesheet" href="cal.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <header>
            <div class="month">
                <p class="prev">&lt;</p>
                <div class="display"></div>
                <p class="next">&gt;</p>
            </div>
            <div class="buttons">
                <div id="btnEvery">
                    <span class="material-symbols-outlined">filter_none</span>
                </div>
                <div id="btnAdd">
                    <span class="material-symbols-outlined">add</span>
                </div>
                <div id="btnToday">
                    <span></span>
                </div>
            </div>
        </header>

        <div class="week">
            <div>일</div>
            <div>월</div>
            <div>화</div>
            <div>수</div>
            <div>목</div>
            <div>금</div>
            <div>토</div>
        </div>

        <div class="days">
            <!-- 날짜 -->
        </div>


        <div class="modal" id="daily-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>반복 일정 추가</h2>
                    <button type="button" class="plus-btn" id="dailyPlus">+</button>
                </div>
                <div class="modal-body">
                    <!-- 일정 추가 -->
                    <!-- 
                    <div class="everyList">
                        <div class="elItem">
                            <input type="checkbox" id="">
                            <label for=""></label>
                        </div>
                        <div class="elBtn">
                            <button type="button" class="elEdit">
                                <span>수정</span>
                            </button>
                            <button type="button" class="elCancel">
                                <span>수정</span>
                            </button>
                        </div>
                    </div>
                     -->
                </div>            
            </div>
        </div>

        <div class="modal" id="day-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2></h2>
                    <button type="button" class="plus-btn" id="dayPlus">+</button>
                </div>
                <div class="modal-body">
                    <!-- 일정 추가 -->
                    
                </div>            
            </div>
        </div>
        
    </div>


    <script src="cal.js"></script>
</body>
</html>
